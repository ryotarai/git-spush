name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          mkdir -p dist

          platforms=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
          )

          for platform in "${platforms[@]}"; do
            read -r goos goarch <<< "${platform}"
            binary="git-spush"
            archive="git-spush_${tag}_${goos}_${goarch}.tar.gz"

            if [ "${goos}" = "windows" ]; then
              binary="git-spush.exe"
              archive="git-spush_${tag}_${goos}_${goarch}.zip"
            fi

            workdir="$(mktemp -d)"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags="-s -w" \
              -o "${workdir}/${binary}" \
              ./cmd/git-spush

            cp README.md "${workdir}/README.md"

            if [ "${goos}" = "windows" ]; then
              (cd "${workdir}" && zip -q "${GITHUB_WORKSPACE}/dist/${archive}" "${binary}" README.md)
            else
              tar -C "${workdir}" -czf "dist/${archive}" "${binary}" README.md
            fi

            rm -rf "${workdir}"
          done

          (cd dist && shasum -a 256 * > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" dist/* --clobber
          else
            gh release create "${tag}" dist/* \
              --title "${tag}" \
              --generate-notes
          fi
